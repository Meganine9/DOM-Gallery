<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pract</title>
</head>
<body>

    <h1>DOM Gallary</h1>
    <div id="box"></div>

    <div id="btnBox"></div>

    <script>
        let doc = document.getElementById("box")
        let btn = document.getElementById("btnBox")
        let imgs = ['img/1.jpg', 'img/2.jpg', 'img/3.jpg' , 'img/4.jpg']
        for(let i=0;i<imgs.length;i++){
            let btns = document.createElement("button")
            btns.textContent = imgs[i]
            btn.appendChild(btns)
        }
         img = document.createElement('img')
        doc.appendChild(img)
        img.setAttribute("src", imgs[0])
        img.setAttribute("alt", "Warship1")
       let btn1 =  document.getElementsByTagName("button")[0]
       let btn2 =  document.getElementsByTagName("button")[1]
       let btn3 =  document.getElementsByTagName("button")[2]
       let btn4 =  document.getElementsByTagName("button")[3]
       btn1.onclick = function(){
        img.setAttribute("src", imgs[0])
        img.setAttribute("alt", "Warship1")
       }

       btn2.onclick = function(){
        img.setAttribute("src", imgs[1])
        img.setAttribute("alt", "Warship2")
       }

       btn3.onclick = function(){
        img.setAttribute("src", imgs[2])
        img.setAttribute("alt", "Warship3")
       }

       btn4.onclick = function(){
        img.setAttribute("src", imgs[3])
        img.setAttribute("alt", "Warship4")
       }
    </script>
</body>
</html>
